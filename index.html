<title>MTT Crush — Poker Hand Replayer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0c10; --surface:#12151e; --surface2:#1a1e2a;
  --border:#252b3a; --border2:#323b52;
  --gold:#d4a017; --gold2:#f0c030;
  --text:#e8ecf0; --text2:#8a96a8; --text3:#3a4252;

  /* Fixed chrome heights — never change with zoom */
  --topbar-h:42px;
  --bottombar-h:56px;

/* ── PAGE SHELL — fixed, never scrolls ── */
html, body {
  width:100%; height:100%;
  overflow:hidden;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  display:flex; align-items:stretch; justify-content:center;
  padding:0;
}
#app { width:100vw; height:100vh; max-width:100vw; display:flex; flex-direction:column; }

/* ── INPUT PANEL ── */
#input-panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px; margin:auto; width:100%; max-width:760px; }
.logo-row { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.logo-badge { background:linear-gradient(135deg,#c49010,#f0c030); border-radius:12px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#0a0c10; flex-shrink:0; }
.logo-title { font-size:20px; font-weight:900; letter-spacing:-.5px; color:var(--gold2); }
.logo-sub   { font-size:12px; color:var(--text2); margin-top:2px; }
#hand-input { width:100%; height:160px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; font-family:'Courier New',monospace; font-size:11px; color:var(--text); resize:vertical; outline:none; transition:border-color .2s; }
#hand-input:focus { border-color:var(--gold); }
#hand-input::placeholder { color:var(--text3); }
.input-footer { display:flex; align-items:center; justify-content:space-between; margin-top:10px; flex-wrap:wrap; gap:8px; }
.input-hint { font-size:11px; color:var(--text3); }
.btn-primary { padding:10px 24px; background:linear-gradient(135deg,#c49010,#f0c030); color:#0a0c10; border:none; border-radius:8px; font-size:13px; font-weight:900; cursor:pointer; letter-spacing:.3px; transition:opacity .15s,transform .1s; }
.btn-primary:hover { opacity:.88; } .btn-primary:active { transform:scale(.97); }

/* ── REPLAYER: fills full height, fixed chrome ── */
#replayer { display:none; gap:12px; width:100%; height:100%; }
#replayer.visible { display:flex; width:100%; height:100vh; align-items:stretch; }

/* ── SIDEBAR — fixed width, full height, px sizes ── */
#sidebar {
  width:var(--sidebar); flex-shrink:0;
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  display:flex; flex-direction:column; overflow:hidden;

}
#sidebar-header {
  height:var(--topbar-h); flex-shrink:0;
  padding:0 12px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
#sidebar-title { font-size:11px; font-weight:700; letter-spacing:.6px; color:var(--text2); }
#sidebar-count { font-size:14px; font-weight:800; color:var(--gold); font-family:monospace; }
#hand-list { flex:1; overflow-y:auto; padding:6px; min-height:0; }
#hand-list::-webkit-scrollbar { width:4px; }

.hand-item {
  display:flex; align-items:center; gap:8px;
  padding:7px 8px; border-radius:8px; cursor:pointer;
  border:1px solid transparent; transition:all .15s; margin-bottom:3px;
}
.hand-item:hover { background:var(--surface2); border-color:var(--border); }
.hand-item.active { background:var(--surface2); border-color:var(--gold); }
.hand-share-btn { flex-shrink:0; background:transparent; border:none; color:var(--text3); font-size:11px; cursor:pointer; padding:3px 5px; border-radius:5px; transition:all .15s; align-self:center; margin-left:auto; }
.hand-share-btn:hover { color:var(--gold); background:rgba(212,160,23,.1); }
.hand-cards { display:flex; gap:3px; flex-shrink:0; }

}

#sidebar-add { padding:8px 12px; border-top:1px solid var(--border); flex-shrink:0; }
#sidebar-add button {
  width:100%; padding:7px; background:transparent; border:1px dashed var(--border2);

}
#sidebar-add button:hover { border-color:var(--gold); color:var(--gold); }

/* ── MAIN AREA: flex column, fixed chrome, canvas fills rest ── */

/* TOP BAR — fixed height */

  height:var(--topbar-h); flex-shrink:0;

.toggle-btn.active { background:var(--gold); color:#0a0c10; }
.btn-ghost { padding:4px 12px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text2); font-size:11px; cursor:pointer; transition:all .15s; flex-shrink:0; }
.btn-ghost:hover { border-color:var(--gold); color:var(--gold); }

#bottom-panel {

}
#phases { display:flex; gap:4px; flex-shrink:0; }
.pill { padding:3px 10px; border-radius:20px; font-size:9px; font-weight:700; letter-spacing:.7px; background:var(--surface2); color:var(--text3); border:1px solid var(--border); transition:all .2s; white-space:nowrap; cursor:pointer; user-select:none; }
.pill:hover { border-color:var(--border2); color:var(--text2); }
.pill.active { background:var(--gold); color:#0a0c10; border-color:var(--gold); }
.pill.done   { background:var(--surface2); color:var(--text2); border-color:var(--border2); }
#action-wrap { flex:1; min-width:0; text-align:center; overflow:hidden; }
#action-player { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#action-detail { font-size:11px; color:var(--gold); margin-top:1px; font-family:monospace; }
#controls { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ctrl-btn { width:30px; height:30px; border-radius:50%; background:var(--surface2); border:1px solid var(--border2); color:var(--text2); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
.ctrl-btn:hover { background:var(--gold); border-color:var(--gold); color:#0a0c10; }

#progress-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }

#kb-hint { font-size:9px; color:var(--text3); padding:3px 8px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); white-space:nowrap; flex-shrink:0; }

/* ── MODAL ── */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; }
#modal-overlay.visible { display:flex; }
#modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:min(600px,90vw); }
#modal h3 { font-size:15px; font-weight:700; color:var(--text); margin-bottom:8px; }

/* ── RESPONSIVE ── */
@media (max-width:700px){
  #replayer.visible { flex-direction:column; }
  #sidebar { width:100%; height:auto; flex-direction:column; max-height:150px; }
  #hand-list { flex-direction:row; display:flex; overflow-x:auto; overflow-y:hidden; }
  .hand-item { flex-shrink:0; }
  #main-area { height:auto; flex:1; }
}
@media (min-width:1400px){
  :root { --sidebar:250px; }

<script>
// ── CONSTANTS ──────────────────────────────────────────────────
const SYM={h:'♥',d:'♦',c:'♣',s:'♠'};
const RED={h:true,d:true};
const RANK={T:'10'};
const POS_LABELS_BY_N={
  2:['BTN','BB'],3:['BTN','SB','BB'],4:['BTN','SB','BB','UTG'],
  5:['BTN','SB','BB','UTG','CO'],6:['BTN','SB','BB','UTG','HJ','CO'],
  7:['BTN','SB','BB','UTG','UTG+1','HJ','CO'],
  8:['BTN','SB','BB','UTG','UTG+1','HJ','CO','LJ'],
  9:['BTN','SB','BB','UTG','UTG+1','UTG+2','LJ','HJ','CO'],
};
const POS_COLOR={BTN:'#f0c040',SB:'#4090e0',BB:'#e04080',UTG:'#50c080','UTG+1':'#50c080','UTG+2':'#50c080',LJ:'#a060e0',HJ:'#e06040',CO:'#40b0c0'};
const SUIT_BG  = {s:'#2a2d35',h:'#c0202a',d:'#1a5fb0',c:'#1e7a3a'};
const SUIT_BG2 = {s:'#363a44',h:'#e03040',d:'#2272cc',c:'#259048'};

// ── STATE ──────────────────────────────────────────────────────
let allHands=[];
let allHandsRaw=[];      // array of parsed hand objects
let curHandIdx=0;     // which hand is active
let gs=null;          // current parsed hand
let cur=0;            // current step index
let steps=[];         // steps for current hand
let timer=null;
let stackMode='bb';

// ── MULTI-HAND SPLITTER ─────────────────────────────────────────
function splitHands(text){
  const cleaned = text.replace(/\*{5,}.*?#\s*\d+.*?\*{5,}/g, '');
  const hands = [];
  const lines = cleaned.split('\n');
  let current = [];
  for(const line of lines){
    const trimmed = line.trim();
    if(!trimmed){ if(current.length){ hands.push(current.join('\n')); current=[]; } continue; }
    current.push(line);
  }
  if(current.length) hands.push(current.join('\n'));
  return hands.filter(h =>
    h.includes('PokerStars Hand') ||
    h.includes('Sisal Hand') ||
    h.includes('888') ||
    h.includes('Hand History') ||
    h.includes('Poker Hand #') ||
    h.includes('GAME #')
  );
}

// Convert iPoker card notation [S4 H6] → ['4s','6h']
function convertIPokerCards(str){
  // str like "S4 H6" or "SA S6"
  const SUIT_MAP={S:'s',H:'h',D:'d',C:'c'};
  const RANK_MAP={T:'T',J:'J',Q:'Q',K:'K',A:'A'};
  return str.trim().split(/\s+/).map(c=>{
    const suit=SUIT_MAP[c[0]]||c[0].toLowerCase();
    const rank=c.slice(1);
    return rank+suit;
  });
}

// Parse iPoker hand format
function parseIPokerHand(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const s={header:{},seats:[],antes:[],actions:{preflop:[],flop:[],turn:[],river:[]},board:[],holeCards:{},showdown:{},summaryLines:[]};

  // Header: "GAME #6692898868 ... Blinds: 15/30"
  const hm=lines[0].match(/GAME #(\d+)/);
  if(hm) s.header.handId=hm[1];
  const blm=lines[0].match(/Blinds:\s*([\d,]+)\/([\d,]+)/);
  if(blm){ s.header.sb=parseFloat(blm[1].replace(',','')); s.header.bb=parseFloat(blm[2].replace(',','')); }
  s.header.level='1'; // iPoker doesn't always show level

  // Tournament
  const tm=lines[0].match(/Tournament/); if(tm) s.header.tournament=s.header.handId;

  // Seats: "Seat 5: pokerrosso (€3,012.00 in chips)  DEALER"
  let btnSeat=-1;
  for(const l of lines){
    const sm=l.match(/^Seat (\d+):\s+(\S+)\s+\(€([\d,.]+)\s+in chips\)(.*)/);
    if(sm){
      const chips=parseFloat(sm[3].replace(/,/g,''));
      s.seats.push({seat:+sm[1],name:sm[2],chips,stack:chips,bet:0,folded:false,allin:false,isHero:false,pos:''});
      if(sm[4].includes('DEALER')) btnSeat=+sm[1];
    }
  }
  if(btnSeat<0 && s.seats.length) btnSeat=s.seats[0].seat;
  s.header.button=btnSeat;
  const n=s.seats.length, btnIdx=s.seats.findIndex(x=>x.seat===btnSeat);
  const posArr=POS_LABELS_BY_N[n]||POS_LABELS_BY_N[9];
  s.seats.forEach((_,i)=>{ s.seats[(btnIdx+i)%n].pos=posArr[i]||''; });

  let phase='pre', inSummary=false;
  for(const l of lines){
    if(l.startsWith('*** SUMMARY')){ inSummary=true; continue; }
    if(inSummary){
      s.summaryLines.push(l);
      // "PlayerName: Shows [SA S6] ..."
      const shm=l.match(/^(\S+):\s+Shows\s+\[(.+?)\]/i);
      if(shm) s.showdown[shm[1]]=convertIPokerCards(shm[2]);
      // "PlayerName: wins €775.00"
      const wm=l.match(/^(\S+):\s+wins\s+€([\d,.]+)/i);
      if(wm && s.actions[phase]) s.actions[phase||'river'].push({player:wm[1],action:'wins',amount:parseFloat(wm[2].replace(/,/g,''))});
      continue;
    }

    if(l.startsWith('*** HOLE CARDS')){ phase='preflop'; continue; }
    if(l.startsWith('*** FLOP')){
      // "*** FLOP *** [S8 HQ D9]"
      const fm=l.match(/\[(.+?)\]/);
      if(fm){ const cards=convertIPokerCards(fm[1]); s.board.push(...cards); }
      phase='flop'; continue;
    }
    if(l.startsWith('*** TURN')){
      // "*** TURN *** [DA]"
      const tm2=l.match(/\[([SHDC][^\]]+)\]\s*$/);
      if(tm2){ const cards=convertIPokerCards(tm2[1]); s.board.push(...cards); }
      phase='turn'; continue;
    }
    if(l.startsWith('*** RIVER')){
      const rm=l.match(/\[([SHDC][^\]]+)\]\s*$/);
      if(rm){ const cards=convertIPokerCards(rm[1]); s.board.push(...cards); }
      phase='river'; continue;
    }

    // "Dealt to xN1CO [S4 H6]"
    const dm=l.match(/^Dealt to (\S+)\s+\[(.+)\]/);
    if(dm){ s.holeCards[dm[1]]=convertIPokerCards(dm[2]); const h=s.seats.find(x=>x.name===dm[1]); if(h) h.isHero=true; continue; }

    // Blinds: "ChiappoGirl: Post SB €15.00"
    const sbm=l.match(/^(\S+):\s+Post SB\s+€([\d,.]+)/i);
    if(sbm){ s.smallBlind={player:sbm[1],amount:parseFloat(sbm[2].replace(/,/g,''))}; continue; }
    const bbm=l.match(/^(\S+):\s+Post BB\s+€([\d,.]+)/i);
    if(bbm){ s.bigBlind={player:bbm[1],amount:parseFloat(bbm[2].replace(/,/g,''))}; continue; }

    // Actions (preflop only after HOLE CARDS)
    if(phase!=='pre'){
      // Fold
      if(l.match(/^(\S+):\s+Fold\s*$/i)){ const pm=l.match(/^(\S+)/); if(pm) s.actions[phase].push({player:pm[1],action:'folds',amount:0,allin:false}); continue; }
      // Check
      if(l.match(/^(\S+):\s+Check\s*$/i)){ const pm=l.match(/^(\S+)/); if(pm) s.actions[phase].push({player:pm[1],action:'checks',amount:0,allin:false}); continue; }
      // Call €30.00
      const callm=l.match(/^(\S+):\s+Call\s+€([\d,.]+)/i);
      if(callm){ s.actions[phase].push({player:callm[1],action:'calls',amount:parseFloat(callm[2].replace(/,/g,'')),allin:false}); continue; }
      // Bet €94.00
      const betm=l.match(/^(\S+):\s+Bet\s+€([\d,.]+)/i);
      if(betm){ s.actions[phase].push({player:betm[1],action:'bets',amount:parseFloat(betm[2].replace(/,/g,'')),allin:false}); continue; }
      // Raise (NF) €60.00 — amount is total raise to
      const raisem=l.match(/^(\S+):\s+Raise(?:\s*\([^)]*\))?\s+€([\d,.]+)/i);
      if(raisem){ s.actions[phase].push({player:raisem[1],action:'raises',amount:parseFloat(raisem[2].replace(/,/g,'')),allin:false}); continue; }
      // All-in variants
      const allm=l.match(/^(\S+):\s+(?:All-In|Allin)\s+€([\d,.]+)/i);
      if(allm){ s.actions[phase].push({player:allm[1],action:'raises all-in',amount:parseFloat(allm[2].replace(/,/g,'')),allin:true}); continue; }
    }

    // wins in non-summary (some formats)
    const wm2=l.match(/^(\S+):\s+wins\s+€([\d,.]+)/i);
    if(wm2 && !inSummary && s.actions[phase]) s.actions[phase].push({player:wm2[1],action:'wins',amount:parseFloat(wm2[2].replace(/,/g,''))});
  }

  s.header.ante=0;
  return s;
}

function parseHandAuto(text){
  if(text.startsWith('GAME #')) return parseIPokerHand(text);
  if(text.includes('Poker Hand #')) return parseHandGG(text);
  if(text.includes('888') || text.includes('Hand History') || text.includes('Dealing flop') || text.includes('** Summary **')) return parseHand888(text);
  // PokerStars and Sisal share the same format
  return parseHand(text);
}
function loadFromFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const txt = e.target.result.trim();
    if(!txt){ alert('File vuoto o non leggibile.'); return; }
    const raw = splitHands(txt);
    if(!raw.length){ alert('Nessuna mano trovata nel file.'); return; }
    allHandsRaw = raw;
    allHands = [];
    for(const r of raw){
      try { allHands.push(parseHandAuto(r)); } catch(err){ console.warn('Skip hand:', err.message); }
    }
    if(!allHands.length){ alert('Nessuna mano valida trovata nel file.'); return; }
    document.getElementById('input-panel').style.display='none';
    document.getElementById('replayer').className='visible';
    renderSidebar();
    selectHand(0);
  };
  reader.onerror = function(){ alert('Errore nella lettura del file.'); };
  reader.readAsText(file, 'utf-8');
  input.value = '';
}

function shareHandByIdx(idx, btn){
  const handText = allHandsRaw[idx];

  const encoded = btoa(unescape(encodeURIComponent(handText)));
  const url = window.location.origin + window.location.pathname + '?hand=' + encoded;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      const orig = btn.textContent;
      btn.textContent = '✓';
      btn.style.color = 'var(--gold)';
      setTimeout(()=>{ btn.textContent = orig; btn.style.color = ''; }, 2000);
    });
  } else {
    prompt('Copia questo link:', url);
  }
}

function romanToArabic(r){
  if(!r) return '?';
  const map={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let n=0;
  for(let i=0;i<r.length;i++){
    const cur=map[r[i]]||0,nxt=map[r[i+1]]||0;
    n+=cur<nxt?-cur:cur;
  }
  return n||r;
}

function renderSidebar(){
  document.getElementById('sidebar-count').textContent = allHands.length;
  const list = document.getElementById('hand-list');
  list.innerHTML = allHands.map((h,i)=>{
    const hero = Object.keys(h.holeCards)[0];
    const cards = hero ? h.holeCards[hero] : [];
    const heroSeat = h.seats.find(s=>s.isHero);
    const pos = heroSeat ? heroSeat.pos : '?';
    // Determine result
    let result='neutral', resultTxt='—';
    if(hero){
      const won = Object.entries(h.showdown||{}).some(([n])=>n===hero);
      // check summary for won/lost
      const sumLine = (h.summaryLines||[]).find(l=>l.includes(hero)&&(l.includes('won')||l.includes('lost')));
      if(sumLine && sumLine.includes('won')){ result='won'; resultTxt='WIN'; }
      else if(sumLine && sumLine.includes('lost')){ result='lost'; resultTxt='LOSS'; }
      else if((h.actions.preflop||[]).some(a=>a.player===hero)){ result='neutral'; resultTxt=''; }
      else { result='neutral'; resultTxt='FOLD'; }
    }
    const cardsHtml = cards.map(c=>{
      const suit=c.slice(-1), rank=RANK[c.slice(0,-1)]||c.slice(0,-1);
      const bg=SUIT_BG[suit]||'#333';
      return `<div class="hand-card-mini" style="background:${bg}">${rank}</div>`;
    }).join('');
    const posCol = POS_COLOR[pos]||'#888';
    const played = (()=>{
      const hero = Object.keys(h.holeCards)[0];
      if(!hero) return false;
      const allActions = [...(h.actions.preflop||[]),...(h.actions.flop||[]),...(h.actions.turn||[]),...(h.actions.river||[])];
      return allActions.some(a => a.player===hero && (a.action.includes('calls')||a.action.includes('raises')||a.action.includes('bets')));
    })();
    return `<div class="hand-item${i===curHandIdx?' active':''}" onclick="selectHand(${i})" style="${played && i!==curHandIdx ? 'border-color:#4a90d9;box-shadow:inset 0 0 0 1px #4a90d933;' : ''}">
      <div class="hand-cards">${cardsHtml}</div>
      <div class="hand-info">
        <div class="hand-pos" style="color:${posCol}">${pos} · Lv ${romanToArabic(h.header.level)}</div>
        <div class="hand-blinds">${fmt(h.header.sb)}/${fmt(h.header.bb)}</div>
        <div class="hand-result ${result}">${resultTxt}</div>
      </div>
      <button onclick="event.stopPropagation();shareHandByIdx(${i},this)" style="flex-shrink:0;padding:3px 8px;background:linear-gradient(135deg,#c49010,#f0c030);color:#0a0c10;border:none;border-radius:6px;font-size:9px;font-weight:900;cursor:pointer;letter-spacing:.3px;transition:opacity .15s;" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">⬆ Condividi</button>
    </div>`;
  }).join('');
}

// ── PARSER ──────────────────────────────────────────────────────
function parseHand(text){
  console.log('[parseHand] running v2 - lines:', text.split('\n').length);
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const s={header:{},seats:[],antes:[],actions:{preflop:[],flop:[],turn:[],river:[]},board:[],holeCards:{},showdown:{},summaryLines:[]};
  const m=lines[0].match(/(?:PokerStars|Sisal) Hand #(\d+).*Level\s+([IVXLCDM]+)\s+\((\d+)\/(\d+)\)/);
  if(m) s.header={handId:m[1],level:m[2],sb:+m[3],bb:+m[4]};
  const tm=lines[0].match(/Tournament #(\d+)/); if(tm) s.header.tournament=tm[1];
  const bm=(lines[1]||'').match(/Seat #(\d+) is the button/)||text.match(/Seat #(\d+) is the button/); s.header.button=bm?+bm[1]:1;
  for(const l of lines){ const sm=l.match(/^Seat (\d+): (\S+) \(([\d,]+) in chips(?:,\s*€([\d.]+)\s*bounty)?\)/); if(sm) s.seats.push({seat:+sm[1],name:sm[2],chips:+sm[3].replace(/,/g,''),stack:+sm[3].replace(/,/g,''),bet:0,folded:false,allin:false,isHero:false,pos:'',bounty:sm[4]?parseFloat(sm[4]):0}); }
  const n=s.seats.length, btnIdx=s.seats.findIndex(x=>x.seat===s.header.button);
  const posArr=POS_LABELS_BY_N[n]||POS_LABELS_BY_N[9];
  s.seats.forEach((_,i)=>{ s.seats[(btnIdx+i)%n].pos=posArr[i]||''; });
  let ante0=0, phase='pre', inSummary=false;
  for(const l of lines){
    if(l.startsWith('*** SUMMARY')){ inSummary=true; continue; }
    if(inSummary){ s.summaryLines.push(l); const shm=l.match(/^Seat \d+: (\S+).*showed \[(.+?)\]/); if(shm) s.showdown[shm[1]]=shm[2].split(' '); continue; }
    if(l.startsWith('*** HOLE CARDS')){ phase='preflop'; continue; }
    if(l.startsWith('*** FLOP')){ const fm=l.match(/\[(.+?)\]/); if(fm) s.board.push(...fm[1].split(' ')); phase='flop'; continue; }
    if(l.startsWith('*** TURN')){ const t2=l.match(/\[.*?\] \[(\S+)\]/); if(t2) s.board.push(t2[1]); phase='turn'; continue; }
    if(l.startsWith('*** RIVER')){ const r2=l.match(/\[.*?\] \[(\S+)\]/); if(r2) s.board.push(r2[1]); phase='river'; continue; }
    const dm=l.match(/^Dealt to (\S+) \[(.+)\]/); if(dm){ s.holeCards[dm[1]]=dm[2].split(' '); const h=s.seats.find(x=>x.name===dm[1]); if(h) h.isHero=true; continue; }
    const inlineShow=l.match(/^(\S+): shows \[(.+)\]/); if(inlineShow) s.showdown[inlineShow[1]]=inlineShow[2].split(' ');
    const am=l.match(/^(\S+?)(?::| ) posts (?:the )?ante ([\d,]+)/); if(am){ s.antes.push({player:am[1],amount:+am[2].replace(/,/g,'')}); if(!ante0) ante0=+am[2].replace(/,/g,''); continue; }
    const sbm=l.match(/^(\S+?)(?::| ) posts small blind ([\d,]+)/); if(sbm){ s.smallBlind={player:sbm[1],amount:+sbm[2].replace(/,/g,'')}; continue; }
    const bbm=l.match(/^(\S+?)(?::| ) posts big blind ([\d,]+)/); if(bbm){ s.bigBlind={player:bbm[1],amount:+bbm[2].replace(/,/g,'')}; continue; }
    if(l.match(/^Uncalled bet/)) continue;
    if(l.match(/doesn't show hand/)) continue;
    if(l.match(/is sitting out/)) continue;
    if(l.match(/is disconnected/)) continue;
    if(l.match(/is connected/)) continue;
    if(l.match(/has returned/)) continue;
    if(l.match(/will be allowed to play/)) continue;
    if(l.match(/out of hand/)) continue;
    if(l.match(/moved from another table/)) continue;
    const acm=l.match(/^(\S+?)(?::| ) (folds|checks|calls|raises|bets)(.+)?/);
    if(acm&&phase!=='pre'){
      const acmPlayer=acm[1];
      let act=acm[2],amt=0;
      if(acm[3]){
        // For raises: "raises 25000 to 50000" — capture the final 'to X' amount
        const toMatch=acm[3].match(/\bto\s+([\d,]+)/);
        if(toMatch) amt=+toMatch[1].replace(/,/g,'');
        else{ const nx=acm[3].match(/([\d,]+)/); if(nx) amt=+nx[1].replace(/,/g,''); }
      }
      const ai=l.includes('and is all-in');
      s.actions[phase].push({player:acmPlayer,action:act+(ai?' all-in':''),amount:amt,allin:ai});
    }
        const cm=l.match(/^(\S+)\s+collected\s+([\d,]+)\s+from/); if(cm&&s.actions[phase]) s.actions[phase].push({player:cm[1],action:'wins',amount:+cm[2].replace(/,/g,'')});
  }
  s.header.ante=ante0; return s;
}

// ── STEP BUILDER ────────────────────────────────────────────────
function parseHand888(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const s={header:{},seats:[],antes:[],actions:{preflop:[],flop:[],turn:[],river:[]},board:[],holeCards:{},showdown:{},summaryLines:[]};
  const blindM = text.match(/(\d+)\/(\d+)\s+Blinds/);
  if(blindM) s.header = {...s.header, sb:+blindM[1], bb:+blindM[2]};
  const tmM = text.match(/Tournament #(\d+)/); if(tmM) s.header.tournament=tmM[1];
  const handM = text.match(/Game No\s*:\s*(\d+)/); if(handM) s.header.handId=handM[1];
  s.header.level = '?';
  const btnM = text.match(/Seat (\d+) is the button/); s.header.button = btnM ? +btnM[1] : 1;
  for(const l of lines){
    const sm = l.match(/^Seat (\d+):\s+(\S+)\s*\(\s*([\d,]+)\s*\)/);
    if(sm) s.seats.push({seat:+sm[1], name:sm[2], chips:+sm[3].replace(/,/g,''), stack:+sm[3].replace(/,/g,''), bet:0, folded:false, allin:false, isHero:false, pos:'', bounty:0});
  }
  const n=s.seats.length, btnIdx=s.seats.findIndex(x=>x.seat===s.header.button);
  const posArr=POS_LABELS_BY_N[n]||POS_LABELS_BY_N[9];
  s.seats.forEach((_,i)=>{ s.seats[(btnIdx+i)%n].pos=posArr[i]||''; });
  let ante0=0, phase='pre';
  for(const l of lines){
    const am = l.match(/^(\S+) posts ante \[(\d+)\]/); if(am){ s.antes.push({player:am[1],amount:+am[2]}); if(!ante0) ante0=+am[2]; continue; }
    const sbm = l.match(/^(\S+) posts small blind \[(\d+)\]/); if(sbm){ s.smallBlind={player:sbm[1],amount:+sbm[2]}; continue; }
    const bbm = l.match(/^(\S+) posts big blind \[(\d+)\]/); if(bbm){ s.bigBlind={player:bbm[1],amount:+bbm[2]}; continue; }
    const dm = l.match(/^Dealt to (\S+)\s*\[\s*(.+?)\s*\]/);
    if(dm){
      const cards = dm[2].split(',').map(c=>c.trim().replace(/(.+)(.)/, (m,r,sv)=>r.trim()+sv.toLowerCase()));
      s.holeCards[dm[1]]=cards;
      const h=s.seats.find(x=>x.name===dm[1]); if(h) h.isHero=true;
      phase='preflop'; continue;
    }
    if(l.includes('Dealing down cards')){ phase='preflop'; continue; }
    if(l.includes('Dealing flop')){
      const fm=l.match(/\[\s*(.+?)\s*\]/);
      if(fm){ const cards=fm[1].split(',').map(c=>c.trim().replace(/(.+)(.)/, (m,r,sv)=>r.trim()+sv.toLowerCase())); s.board.push(...cards); }
      phase='flop'; continue;
    }
    if(l.includes('Dealing turn')){
      const tm2=l.match(/\[\s*(.+?)\s*\]/);
      if(tm2){ const c=tm2[1].trim().replace(/(.+)(.)/, (m,r,sv)=>r.trim()+sv.toLowerCase()); s.board.push(c); }
      phase='turn'; continue;
    }
    if(l.includes('Dealing river')){
      const rm=l.match(/\[\s*(.+?)\s*\]/);
      if(rm){ const c=rm[1].trim().replace(/(.+)(.)/, (m,r,sv)=>r.trim()+sv.toLowerCase()); s.board.push(c); }
      phase='river'; continue;
    }
    if(l.includes('** Summary **')){ phase='summary'; continue; }
    if(phase==='summary'){
      s.summaryLines.push(l);
      const shm=l.match(/^(\S+) shows\s*\[\s*(.+?)\s*\]/);
      if(shm){ const cards=shm[2].split(',').map(c=>c.trim().replace(/(.+)(.)/, (m,r,sv)=>r.trim()+sv.toLowerCase())); s.showdown[shm[1]]=cards; }
      const wm=l.match(/(\S+) collected \[\s*([\d,]+)\s*\]/);
      if(wm) s.actions['river'].push({player:wm[1],action:'wins',amount:+wm[2].replace(/,/g,'')});
      continue;
    }
    if(phase!=='pre' && phase!=='summary'){
      const fold=l.match(/^(\S+) folds/); if(fold){ s.actions[phase].push({player:fold[1],action:'folds',amount:0,allin:false}); continue; }
      const check=l.match(/^(\S+) checks/); if(check){ s.actions[phase].push({player:check[1],action:'checks',amount:0,allin:false}); continue; }
      const call=l.match(/^(\S+) calls \[([\d,]+)\]/); if(call){ const ai=l.includes('All-in')||l.includes('all-in'); s.actions[phase].push({player:call[1],action:'calls'+(ai?' all-in':''),amount:+call[2].replace(/,/g,''),allin:ai}); continue; }
      const raise=l.match(/^(\S+) raises \[([\d,]+)\]/); if(raise){ const ai=l.includes('All-in')||l.includes('all-in'); s.actions[phase].push({player:raise[1],action:'raises'+(ai?' all-in':''),amount:+raise[2].replace(/,/g,''),allin:ai}); continue; }
      const bet=l.match(/^(\S+) bets \[([\d,]+)\]/); if(bet){ const ai=l.includes('All-in')||l.includes('all-in'); s.actions[phase].push({player:bet[1],action:'bets'+(ai?' all-in':''),amount:+bet[2].replace(/,/g,''),allin:ai}); continue; }
      const win=l.match(/(\S+) collected \[([\d,]+)\]/); if(win){ s.actions[phase].push({player:win[1],action:'wins',amount:+win[2].replace(/,/g,'')}); continue; }
    }
  }
  s.header.ante=ante0;
  return s;
}

function parseHandGG(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const s={header:{},seats:[],antes:[],actions:{preflop:[],flop:[],turn:[],river:[]},board:[],holeCards:{},showdown:{},summaryLines:[]};
  const handM = text.match(/Poker Hand #(\S+):/); if(handM) s.header.handId=handM[1];
  const tmM = text.match(/Tournament #(\d+)/); if(tmM) s.header.tournament=tmM[1];
  const blindM = text.match(/Level\d*\(?([\d,]+)\/([\d,]+)/);
  if(blindM){ s.header.sb=+blindM[1].replace(/,/g,''); s.header.bb=+blindM[2].replace(/,/g,''); }
  const levelM = text.match(/Level(\d+)/); s.header.level = levelM ? levelM[1] : '?';
  const btnM = text.match(/Seat #(\d+) is the button/); s.header.button = btnM ? +btnM[1] : 1;
  const anteM = text.match(/\([\d,]+\/[\d,]+\(([\d,]+)\)\)/);
  if(anteM) s.header.ante = +anteM[1].replace(/,/g,'');
  for(const l of lines){
    const sm = l.match(/^Seat (\d+):\s+(.+?)\s*\(([\d,]+) in chips\)/);
    if(sm) s.seats.push({seat:+sm[1],name:sm[2].trim(),chips:+sm[3].replace(/,/g,''),stack:+sm[3].replace(/,/g,''),bet:0,folded:false,allin:false,isHero:sm[2].trim()==='Hero',pos:'',bounty:0});
  }
  const n=s.seats.length, btnIdx=s.seats.findIndex(x=>x.seat===s.header.button);
  const posArr=POS_LABELS_BY_N[n]||POS_LABELS_BY_N[9];
  s.seats.forEach((_,i)=>{ s.seats[(btnIdx+i)%n].pos=posArr[i]||''; });
  let ante0=0, phase='pre';
  for(const l of lines){
    const am=l.match(/^(.+?): posts the ante ([\d,]+)/);
    if(am){ s.antes.push({player:am[1],amount:+am[2].replace(/,/g,'')}); if(!ante0) ante0=+am[2].replace(/,/g,''); continue; }
    const sbm=l.match(/^(.+?): posts small blind ([\d,]+)/);
    if(sbm){ s.smallBlind={player:sbm[1],amount:+sbm[2].replace(/,/g,'')}; continue; }
    const bbm=l.match(/^(.+?): posts big blind ([\d,]+)/);
    if(bbm){ s.bigBlind={player:bbm[1],amount:+bbm[2].replace(/,/g,'')}; continue; }
    if(l.match(/^HOLE CARDS/)){ phase='preflop'; continue; }
    if(l.match(/^FLOP\s*\[/)){ const fm=l.match(/\[(.+?)\]/); if(fm) s.board.push(...fm[1].split(' ').filter(Boolean)); phase='flop'; continue; }
    if(l.match(/^TURN\s*\[/)){ const tm=l.match(/\[[\w\s]+\]\s*\[(\w+)\]/); if(tm) s.board.push(tm[1]); phase='turn'; continue; }
    if(l.match(/^RIVER\s*\[/)){ const rm=l.match(/\[[\w\s]+\]\s*\[(\w+)\]/); if(rm) s.board.push(rm[1]); phase='river'; continue; }
    if(l.match(/^SHOWDOWN/)){ phase='showdown'; continue; }
    if(l.match(/^SUMMARY/)){ phase='summary'; continue; }
    const dm=l.match(/^Dealt to (.+?)\s*\[(.+)\]/);
    if(dm && dm[2].trim()){ const cards=dm[2].trim().split(/\s+/); s.holeCards[dm[1].trim()]=cards; const h=s.seats.find(x=>x.name===dm[1].trim()); if(h) h.isHero=true; continue; }
    if(phase==='summary'){
      s.summaryLines.push(l);
      const shm=l.match(/^Seat \d+: (.+?) showed \[(.+?)\] and (?:won|lost)/);
      if(shm){ s.showdown[shm[1].trim()]=shm[2].split(' ').filter(Boolean); }
      continue;
    }
    if(phase==='showdown'){
      const shm=l.match(/^(.+?): shows \[(.+?)\]/);
      if(shm){ s.showdown[shm[1].trim()]=shm[2].split(' ').filter(Boolean); }
      const wm=l.match(/^(.+?) collected ([\d,]+) from/);
      if(wm){ s.actions['river'].push({player:wm[1].trim(),action:'wins',amount:+wm[2].replace(/,/g,'')}); }
      continue;
    }
    if(phase!=='pre' && phase!=='summary' && phase!=='showdown'){
      const fold=l.match(/^(.+?): folds/); if(fold){ s.actions[phase].push({player:fold[1].trim(),action:'folds',amount:0,allin:false}); continue; }
      const check=l.match(/^(.+?): checks/); if(check){ s.actions[phase].push({player:check[1].trim(),action:'checks',amount:0,allin:false}); continue; }
      const call=l.match(/^(.+?): calls ([\d,]+)/); if(call){ const ai=l.includes('all-in'); s.actions[phase].push({player:call[1].trim(),action:'calls'+(ai?' all-in':''),amount:+call[2].replace(/,/g,''),allin:ai}); continue; }
      const raise=l.match(/^(.+?): raises [\d,]+ to ([\d,]+)/); if(raise){ const ai=l.includes('all-in'); s.actions[phase].push({player:raise[1].trim(),action:'raises'+(ai?' all-in':''),amount:+raise[2].replace(/,/g,''),allin:ai}); continue; }
      const bet=l.match(/^(.+?): bets ([\d,]+)/); if(bet){ const ai=l.includes('all-in'); s.actions[phase].push({player:bet[1].trim(),action:'bets'+(ai?' all-in':''),amount:+bet[2].replace(/,/g,''),allin:ai}); continue; }
      const win=l.match(/^(.+?) collected ([\d,]+) from/); if(win){ s.actions[phase].push({player:win[1].trim(),action:'wins',amount:+win[2].replace(/,/g,'')}); continue; }
    }
  }
  s.header.ante=ante0;
  return s;
}

function buildSteps(g){
  const out=[], seats=JSON.parse(JSON.stringify(g.seats));
  let pot=0; const board=[], shown={};
  function snap(activePlayer,action,amount,phase,extra){
    const seatActions={};
    if(activePlayer&&activePlayer!=='—') seatActions[activePlayer]={action,amount};
    out.push({activePlayer,action,amount,seats:JSON.parse(JSON.stringify(seats)),pot,board:[...board],shown:{...shown},phase:phase||'preflop',seatActions,...(extra||{})});
  }
  // Apply all antes silently — pot accumulates but no steps generated
  for(const a of g.antes){ const p=seats.find(s=>s.name===a.player); if(p){p.stack-=a.amount;p.bet+=a.amount;pot+=a.amount;} }
  // Reset bets so antes don't show as chips — pot already contains them
  for(const p of seats) p.bet=0;
  // Apply SB and BB silently first
  if(g.smallBlind){ const p=seats.find(s=>s.name===g.smallBlind.player); if(p){p.stack-=g.smallBlind.amount;p.bet=g.smallBlind.amount;pot+=g.smallBlind.amount;} }
  if(g.bigBlind){ const p=seats.find(s=>s.name===g.bigBlind.player); if(p){p.stack-=g.bigBlind.amount;p.bet=g.bigBlind.amount;pot+=g.bigBlind.amount;} }
  // First visible step: both SB and BB already on table, hole cards dealt
  const hero=Object.keys(g.holeCards)[0];
  if(hero){ shown[hero]=g.holeCards[hero]; }
  snap('—','Inizio mano','','preflop');
  const bc=g.board;
  const phaseList=['preflop','flop','turn','river'];
  for(const ph of phaseList){
    const acts=g.actions[ph]||[];
    // Reset bets when a new street begins (flop/turn/river)
    if(ph==='flop'&&bc.length>=3){ for(const p of seats)p.bet=0; board.length=0; board.push(bc[0],bc[1],bc[2]); snap('—','Flop',bc.slice(0,3).join(' '),'flop'); }
    else if(ph==='turn'&&bc.length>=4){ for(const p of seats)p.bet=0; board.push(bc[3]); snap('—','Turn',bc[3],'turn'); }
    else if(ph==='river'&&bc.length>=5){ for(const p of seats)p.bet=0; board.push(bc[4]); snap('—','River',bc[4],'river'); }
    for(const a of acts){
      const p=seats.find(s=>s.name===a.player); if(!p) continue;
      if(a.action.includes('folds')) p.folded=true;
      else if(a.action.includes('calls')){
        // "calls X" — X is the extra amount paid, not the total
        pot+=a.amount; p.stack-=a.amount; p.bet+=a.amount;
      }
      else if(a.action.includes('raises')){
        // "raises X to Y" — a.amount is the total (Y), p.bet is what they've already put in
        const extra=a.amount-p.bet;
        if(extra>0){pot+=extra; p.stack-=extra;}
        p.bet=a.amount;
      }
      else if(a.action.includes('bets')){
        pot+=a.amount; p.stack-=a.amount; p.bet=a.amount;
      }
      if(a.allin) p.allin=true;
      let action='',amount='';
      if(a.action.includes('calls')){action='Call';amount=fmt(a.amount);}
      else if(a.action.includes('raises')){action=a.allin?'Raise ALL-IN':'Raise';amount=fmt(a.amount);}
      else if(a.action.includes('bets')){action=a.allin?'Bet ALL-IN':'Bet';amount=fmt(a.amount);}
      else if(a.action.includes('folds')){action='Fold';}
      else if(a.action.includes('checks')){action='Check';}
      else if(a.action==='wins'){
        action='Vince'; amount=fmt(a.amount);
        const winnerIdx = seats.findIndex(s=>s.name===a.player);
        // Step 1: pot visible, winner chip shows amount won
        snap(a.player, action, amount, ph, {winnerIdx});
        // Step 2: pot zeroed, winner chip shows won amount, stack updated
        for(const seat of seats) seat.bet=0;
        p.stack += a.amount;
        p.bet = a.amount;
        pot = 0;
        snap(a.player, action, amount, ph);
        continue;
      }
      snap(a.player,action,amount,ph);
    }
  }
  const sdShown={...shown};
  for(const [name,cards] of Object.entries(g.showdown||{})) sdShown[name]=cards;
  // Clear all bets including winner before showdown
  for(const seat of seats) seat.bet=0;
  out.push({activePlayer:'—',action:'Showdown',amount:'',seats:JSON.parse(JSON.stringify(seats)),pot,board:[...board],shown:sdShown,phase:'river',seatActions:{}});
  return out;
}

// ── NAVIGATION ──────────────────────────────────────────────────
function goToStep(n){
  cur=Math.max(0,Math.min(n,steps.length-1));
  document.getElementById('step-slider').value=cur;
  document.getElementById('step-label').textContent=(cur+1)+'/'+steps.length;
  const st=steps[cur];
  const order=['preflop','flop','turn','river'],ci=order.indexOf(st.phase);
  order.forEach((ph,i)=>{ document.getElementById('ph-'+ph).className='pill'+(i===ci?' active':i<ci?' done':''); });
  const disp=st.activePlayer==='—'?st.action:`${st.activePlayer} → ${st.action}`;
  document.getElementById('action-player').textContent=disp;
  document.getElementById('action-detail').textContent=st.amount||'';
  renderCanvas(st);
}
function step(d){ goToStep(cur+d); }

function jumpToPhase(phase){
  // Find the first step index that matches the requested phase
  const idx = steps.findIndex(s => s.phase === phase);
  if(idx >= 0) goToStep(idx);
}
function togglePlay(){
  if(timer){clearInterval(timer);timer=null;document.getElementById('play-btn').textContent='▶';return;}
  document.getElementById('play-btn').textContent='⏸';
  timer=setInterval(()=>{ if(cur>=steps.length-1){clearInterval(timer);timer=null;document.getElementById('play-btn').textContent='▶';return;} goToStep(cur+1); },1400);
}

// ── KEYBOARD ────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.getElementById('replayer').className!=='visible') return;
  if(document.getElementById('modal-overlay').className==='visible') return;
  // Don't steal from text inputs
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  switch(e.key){
    case 'ArrowRight': e.preventDefault(); step(1); break;
    case 'ArrowLeft':  e.preventDefault(); step(-1); break;
    case 'ArrowDown':  e.preventDefault(); selectHand(curHandIdx+1); break;
    case 'ArrowUp':    e.preventDefault(); selectHand(curHandIdx-1); break;
    case ' ':          e.preventDefault(); togglePlay(); break;
  }
});

// ── STACK MODE ──────────────────────────────────────────────────
function setStackMode(m){
  stackMode=m;
  document.getElementById('btn-chips').className='toggle-btn'+(m==='chips'?' active':'');
  document.getElementById('btn-bb').className='toggle-btn'+(m==='bb'?' active':'');
  if(steps.length) renderCanvas(steps[cur]);
}
function fmtStack(chips){
  if(stackMode==='bb'&&gs){ const bb=gs.header.bb||1,v=chips/bb; return (v%1===0?v.toFixed(0):v.toFixed(1))+' BB'; }
  return fmt(chips);
}

const _canvasWrap = document.getElementById('canvas-wrap');
if(typeof ResizeObserver !== 'undefined'){
  new ResizeObserver(()=>{ if(steps.length) renderCanvas(steps[cur]); }).observe(_canvasWrap);

function renderCanvas(st){
  const wrap=document.getElementById('canvas-wrap');
  const c=document.getElementById('tc');
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth||640, H=wrap.clientHeight||416;
  // Set canvas physical size = CSS size × device pixel ratio for sharp rendering
  c.width=Math.round(W*dpr); c.height=Math.round(H*dpr);
  c.style.width=W+'px'; c.style.height=H+'px';
  const ctx=c.getContext('2d');
  ctx.scale(dpr,dpr); // all drawing uses CSS pixels
  ctx.fillStyle='#0a0c10'; ctx.fillRect(0,0,W,H);
  drawTable(ctx,W,H);
  const pos=seatPositions(st.seats,W,H);
  drawPot(ctx,W,H,st.pot);
  drawBoard(ctx,W,H,st.board);
  st.seats.forEach((s,i)=>drawSeat(ctx,s,pos[i],W,H,st.seatActions[s.name]||null,st.shown[s.name]));
  st.seats.forEach((s,i)=>drawBetChip(ctx,s,pos[i],W,H));
  drawAllInBadges(ctx,st.seats,pos,W,H); // always on top
}

function drawTable(ctx,W,H){
  const cx=W/2,cy=H/2,rx=W*.28,ry=H*.26;

  // drop shadow
  ctx.save();ctx.shadowColor='rgba(0,0,0,.95)';ctx.shadowBlur=50;
  ctx.beginPath();ctx.ellipse(cx,cy+4,rx+6,ry+5,0,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
  ctx.restore();

  // gold glow
  ctx.save();ctx.shadowColor='rgba(212,160,23,.6)';ctx.shadowBlur=24;
  ctx.beginPath();ctx.ellipse(cx,cy,rx+8,ry+6,0,0,Math.PI*2);ctx.strokeStyle='#d4a017';ctx.lineWidth=3;ctx.stroke();
  ctx.restore();

  // rail fill
  ctx.beginPath();ctx.ellipse(cx,cy,rx+6,ry+5,0,0,Math.PI*2);ctx.fillStyle='#1a1400';ctx.fill();

  // gold border
  ctx.beginPath();ctx.ellipse(cx,cy,rx+4,ry+3,0,0,Math.PI*2);ctx.strokeStyle='#d4a017';ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rx+1,ry+1,0,0,Math.PI*2);ctx.strokeStyle='rgba(240,192,48,.35)';ctx.lineWidth=1;ctx.stroke();

  // ── FELT IMAGE clipped to ellipse ──
  if(TABLE_IMG.complete && TABLE_IMG.naturalWidth){
    ctx.save();
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.clip();
    // Scale image ~22% larger than the ellipse bounding box so the rounded
    // corners of the image (which are grey) fall outside the ellipse clip.
    const scale=1.22;
    const iw=rx*2*scale, ih=ry*2*scale;
    ctx.drawImage(TABLE_IMG, cx-iw/2, cy-ih/2, iw, ih);
    ctx.restore();
  } else {
    // fallback: plain dark felt
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle='#080810';ctx.fill();
  }

  // inner vignette
  const grd=ctx.createRadialGradient(cx,cy,ry*.3,cx,cy,rx);
  grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.save();ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.clip();
  ctx.fillStyle=grd;ctx.fillRect(cx-rx,cy-ry,rx*2,ry*2);
  ctx.restore();
}

function seatBlockMetrics(W,H){
  const pw=Math.max(150,W*.145);
  const ph=Math.max(44,Math.min((H||500)*.060, 64)); // capped at 64px max
  const cw=Math.max(32,W*.044); const ch=cw*1.37;
  const ov=ch*0.22;
  const tableGap=Math.max(10,W*.012);
  const blockH=ch+ph-ov;
  return {pw,ph,cw,ch,ov,blockH,tableGap};
}
function seatPositions(seats,W,H){
  const hi=seats.findIndex(s=>s.isHero),n=seats.length;
  const{pw,blockH,tableGap,ch,ov}=seatBlockMetrics(W,H);
  // Table is now W*.22 × H*.20
  const tableRX=W*.28+6, tableRY=H*.26+5;
  const PAD_X=pw/2-10;
  const PAD_Y=blockH/2-ch+ov+tableGap-4;
  const rx=tableRX+PAD_X;
  const ry=tableRY+PAD_Y;
  return seats.map((_,i)=>{ const off=(i-hi+n)%n,angle=Math.PI/2+(off/n)*Math.PI*2; return{x:W/2+Math.cos(angle)*rx,y:H/2+Math.sin(angle)*ry}; });
}

function drawBetChip(ctx,s,pos,W,H){
  if(!s.bet||s.folded) return;
  const{x,y}=pos, dx=W/2-x, dy=H/2-y;

  const minCenterDist = Math.max(55, W*.06);
  const d = Math.sqrt(dx*dx+dy*dy)||1;

  // Start with t=0.30, but ensure chip stays at least minCenterDist from table center
  let t = 0.42;
  let bx = x + dx*t, by = y + dy*t;
  const chipDistFromCenter = Math.sqrt((bx-W/2)**2+(by-H/2)**2);
  if(chipDistFromCenter < minCenterDist){
    // Push chip further toward player until min distance satisfied
    const tMin = 1 - minCenterDist/d;
    t = Math.max(t, Math.min(tMin, 0.55));
    bx = x + dx*t; by = y + dy*t;
  }

  const padding = Math.max(60, W*.05);
  bx = Math.max(padding, Math.min(W-padding, bx));
  by = Math.max(padding, Math.min(H-padding, by));

  const r  = Math.max(6, W*.0085);
  const fs = Math.max(8, W*.011);
  const labelVal = fmtStack(s.bet);

  ctx.save();
  ctx.font = `700 ${fs}px 'Segoe UI',Arial,sans-serif`;
  const tw = ctx.measureText(labelVal).width;
  const pillH = fs * 1.4;
  const gap   = r * 0.6;
  const rowW  = tw + 10 + gap + r*2;
  const pillX = bx - rowW/2;

  roundRect(ctx, pillX, by - pillH/2, tw+10, pillH, pillH/2);
  ctx.fillStyle = 'rgba(10,14,28,.82)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.08)'; ctx.lineWidth = .5; ctx.stroke();
  ctx.fillStyle = '#e8e0c8';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(labelVal, pillX + (tw+10)/2, by);

  const cx = pillX + tw + 10 + gap + r;
  const cy = by;

  ctx.beginPath(); ctx.arc(cx, cy+1.5, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,.45)'; ctx.fill();

  const grd = ctx.createRadialGradient(cx-r*.3, cy-r*.3, r*.05, cx, cy, r);
  grd.addColorStop(0, '#f5d860');
  grd.addColorStop(0.5,'#d4a017');
  grd.addColorStop(1, '#8a5c00');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,220,80,.6)'; ctx.lineWidth = Math.max(.8,r*.10); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, r*.62, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = Math.max(.5,r*.07); ctx.stroke();
  const hl = ctx.createRadialGradient(cx-r*.28,cy-r*.28,0,cx,cy,r*.7);
  hl.addColorStop(0,'rgba(255,255,255,.40)'); hl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = hl; ctx.fill();

  // ── ALL-IN badge drawn separately in drawAllInBadges() ──

  ctx.restore();
}

// Drawn last in renderCanvas so never covered
function drawAllInBadges(ctx, seats, pos, W, H){
  seats.forEach((s, i) => {
    if(!s.allin || s.folded) return;
    const{x,y}=pos[i], dx=W/2-x, dy=H/2-y;
    const tFinal=0.30;
    const bx=x+dx*tFinal, by=y+dy*tFinal;

    // Measure pill width to position badge beside it
    const fs=Math.max(8,W*.011);
    ctx.font=`700 ${fs}px 'Segoe UI',Arial,sans-serif`;
    const labelVal=fmtStack(s.bet||0);
    const tw=ctx.measureText(labelVal).width;
    const pillH=fs*1.4;
    const r=Math.max(6,W*.0085);
    const gap=r*0.6;
    const rowW=tw+10+gap+r*2;

    // Badge sits toward center from the pill (opposite side from player)
    const bw=Math.max(38,W*.052);
    const bh=bw*0.52;

    // Direction from center toward player (away from center)
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dx/len, ny=-dy/len; // unit vector toward player (away from center)

    // Place badge between chip and player's nameplate
    const badgeCX = bx + nx*(rowW/2 + bw/2 + 6);
    const badgeCY = by;

    ctx.save();
    // shadow
    ctx.beginPath();
    ctx.moveTo(badgeCX, badgeCY - bh/2 + 2);
    ctx.lineTo(badgeCX - bw/2 + 2, badgeCY + bh/2 + 2);
    ctx.lineTo(badgeCX + bw/2 + 2, badgeCY + bh/2 + 2);
    ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fill();

    // red triangle
    ctx.beginPath();
    ctx.moveTo(badgeCX, badgeCY - bh/2);
    ctx.lineTo(badgeCX - bw/2, badgeCY + bh/2);
    ctx.lineTo(badgeCX + bw/2, badgeCY + bh/2);
    ctx.closePath();
    ctx.fillStyle='#ff2020'; ctx.fill();
    ctx.strokeStyle='#d4a017'; ctx.lineWidth=Math.max(1,bw*.028); ctx.stroke();

    // text
    const tfs=Math.max(6,bw*.17);
    ctx.font=`900 ${tfs}px 'Segoe UI',Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.fillText('ALL IN', badgeCX+.5, badgeCY+bh*.10+.5);
    ctx.fillStyle='#ffffff';
    ctx.fillText('ALL IN', badgeCX, badgeCY+bh*.10);
    ctx.restore();
  });
}
// The chip is viewed from ~30° above: face is a full circle, edge is an elliptical band below
function chip3d(ctx, cx, cy, r, th, color, label){
  ctx.save();

  const face   = color.bg;
  const edgeT  = darken(face, .30);   // top edge (lighter)
  const edgeB  = darken(face, .65);   // bottom edge (darker)
  const stripe = color.stripe;

  // ── 1. Ground shadow ──
  ctx.shadowColor='rgba(0,0,0,.50)'; ctx.shadowBlur=r*.8;
  ctx.beginPath();
  ctx.ellipse(cx, cy + th + r*.12, r*.90, r*.18, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0)'; ctx.fill(); // invisible but casts shadow
  ctx.shadowBlur=0;

  // ── 2. Cylindrical side ──
  // Top ellipse of the cylinder = cy (flat top of side band)
  // Bottom ellipse              = cy + th
  // We fill it with a vertical gradient using multiple horizontal slices
  const steps = Math.ceil(th);
  for(let i=steps; i>=0; i--){
    const t = i/steps; // 0=bottom 1=top
    // interpolate color top→bottom
    const c = lerpColor(edgeT, edgeB, 1-t);
    ctx.beginPath();
    ctx.ellipse(cx, cy + th*(1-t), r, r*.22, 0, 0, Math.PI*2);
    ctx.fillStyle = c;
    ctx.fill();
  }
  // Subtle highlight arc on left side of cylinder
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r*.22, 0, Math.PI, Math.PI*2); // top half ellipse
  ctx.lineTo(cx, cy+th);
  ctx.ellipse(cx, cy+th, r, r*.22, 0, Math.PI*2, Math.PI, true);
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fill();
  ctx.restore();
  // Dark outline of bottom ellipse
  ctx.beginPath();
  ctx.ellipse(cx, cy+th, r, r*.22, 0, 0, Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=.5; ctx.stroke();

  // ── 3. Face disc (top of chip) ──
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = face; ctx.fill();

  // ── 4. Rim (white outline) ──
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.35)';
  ctx.lineWidth = Math.max(.8, r*.07); ctx.stroke();

  // ── 5. Inset groove ring ──
  ctx.beginPath(); ctx.arc(cx, cy, r*.82, 0, Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.30)';
  ctx.lineWidth = Math.max(.8, r*.06); ctx.stroke();

  // ── 6. Stripe notches — 4 segments at N/E/S/W ──
  const nA = .30; // half-angle of each notch
  [0, Math.PI*.5, Math.PI, Math.PI*1.5].forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a-nA)*r*.73, cy + Math.sin(a-nA)*r*.73);
    ctx.arc(cx, cy, r*.98, a-nA, a+nA);
    ctx.arc(cx, cy, r*.73, a+nA, a-nA, true);
    ctx.closePath();
    ctx.fillStyle = stripe; ctx.fill();
  });
  // Re-draw outer rim over notches
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.20)';
  ctx.lineWidth=Math.max(.5,r*.05); ctx.stroke();

  // ── 7. Inner hub ──
  ctx.beginPath(); ctx.arc(cx, cy, r*.48, 0, Math.PI*2);
  ctx.fillStyle = darken(face, .15); ctx.fill();
  // Radial highlight on hub
  const hg = ctx.createRadialGradient(cx-r*.18, cy-r*.18, 0, cx, cy, r*.48);
  hg.addColorStop(0,'rgba(255,255,255,.22)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r*.48, 0, Math.PI*2);
  ctx.fillStyle=hg; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r*.48, 0, Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.18)';
  ctx.lineWidth=Math.max(.5,r*.04); ctx.stroke();

  // ── 8. Top specular highlight (top-left arc) ──
  const hlg = ctx.createRadialGradient(cx-r*.35, cy-r*.35, 0, cx, cy, r);
  hlg.addColorStop(0,'rgba(255,255,255,.28)'); hlg.addColorStop(.5,'rgba(255,255,255,.04)'); hlg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle=hlg; ctx.fill();

  // ── 9. Amount label ──
  if(label){
    const fs = Math.max(6, r*.44);
    ctx.font=`900 ${fs}px 'Segoe UI',Arial,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.fillText(label, cx+.4, cy+.4);
    ctx.fillStyle='#fff';
    ctx.fillText(label, cx, cy);
  }

  ctx.restore();
}

// Linear interpolate between two hex colors
function lerpColor(a, b, t){
  const ac=parseInt(a.replace('#',''),16), bc=parseInt(b.replace('#',''),16);
  const r=Math.round(((ac>>16)&255)*(1-t)+((bc>>16)&255)*t);
  const g=Math.round(((ac>>8)&255)*(1-t)+((bc>>8)&255)*t);
  const bv=Math.round(((ac)&255)*(1-t)+((bc)&255)*t);
  return `rgb(${r},${g},${bv})`;
}

function hexRGB(hex){
  const c=parseInt(hex.replace('#',''),16);
  return `${(c>>16)&255},${(c>>8)&255},${c&255}`;
}

function darken(hex, amt){
  const c=parseInt(hex.replace('#',''),16);
  const r=Math.max(0,Math.floor(((c>>16)&255)*(1-amt)));
  const g=Math.max(0,Math.floor(((c>>8)&255)*(1-amt)));
  const b=Math.max(0,Math.floor(((c)&255)*(1-amt)));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function fmtChip(n){
  if(n>=1000000) return (n/1e6).toFixed(1)+'M';
  if(n>=10000)   return Math.round(n/1000)+'k';
  if(n>=1000)    return (n/1000).toFixed(1)+'k';
  return String(n);
}

function chipColors(bet, bb){
  const ratio = bb>0 ? bet/bb : bet;
  const tiers=[
    {min:0,    bg:'#ddd8c8', stripe:'#c01020'},
    {min:5,    bg:'#c81520', stripe:'#f0f0f0'},
    {min:20,   bg:'#187a28', stripe:'#f0f0f0'},
    {min:100,  bg:'#141414', stripe:'#d4a017'},
    {min:500,  bg:'#6820b0', stripe:'#d4a017'},
    {min:2000, bg:'#c8a010', stripe:'#141414'},
  ];
  let ti=0;
  for(let i=0;i<tiers.length;i++) if(ratio>=tiers[i].min) ti=i;
  return [tiers[ti], tiers[Math.max(0,ti-1)]];
}

function drawDealerButton(ctx, seats, pos, W, H) {
  const btnIdx = seats.findIndex(s => s.pos === 'BTN');
  if (btnIdx < 0) return;
  const { x, y } = pos[btnIdx];
  const r = Math.max(9, W * .013);
  const tRX = W * .28, tRY = H * .26;
  // Angolo del seat BTN rispetto al centro del tavolo
  const btnAngle = Math.atan2(y - H/2, x - W/2);
  // Sposta il D di 50 gradi in senso orario lungo il bordo del tavolo
  const shift = Math.PI * 50 / 180;
  const dAngle = btnAngle + shift;
  // Punto sul bordo interno dell'ellisse nella direzione shiftata
  const cosA = Math.cos(dAngle), sinA = Math.sin(dAngle);
  const ellipseDist = (tRX * tRY) / Math.sqrt(tRY*tRY*cosA*cosA + tRX*tRX*sinA*sinA);
  // Inset per tenere D ben dentro il tavolo
  const inset = Math.max(r * 2.5, W * .04);
  let bx = W/2 + cosA * (ellipseDist - inset);
  let by = H/2 + sinA * (ellipseDist - inset);
  // Clamp dentro il canvas
  const pad = r * 3;
  bx = Math.max(pad, Math.min(W - pad, bx));
  by = Math.max(pad, Math.min(H - pad, by));
  ctx.save();
  ctx.shadowColor = 'rgba(240,220,80,.5)'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(bx, by, r + 1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(240,220,80,.08)'; ctx.fill();
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(bx, by + 1.5, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fill();
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fillStyle = '#f8f4e8'; ctx.fill();
  ctx.strokeStyle = '#c8a420'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(bx, by, r * .72, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(180,140,20,.4)'; ctx.lineWidth = .5; ctx.stroke();
  const fs = Math.max(8, r * 1.0);
  ctx.font = `900 ${fs}px 'Segoe UI',Arial,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1a1208'; ctx.fillText('D', bx, by + .5);
  ctx.restore();
}

function drawPot(ctx,W,H,pot){
  if(!pot) return;
  const potLabel = stackMode==='bb'&&gs ? (pot/(gs.header.bb||1)).toFixed(1)+' BB' : 'Pot: '+fmt(pot);
  const cy = H/2 - H*.13;
  const fs = Math.max(14, W*.016);
  ctx.save();
  ctx.font = `700 ${fs}px 'Segoe UI',Arial,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const tw = ctx.measureText(potLabel).width;
  roundRect(ctx, W/2-tw/2-8, cy-fs*.75, tw+16, fs*1.5, 5);
  ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.88)';
  ctx.fillText(potLabel, W/2, cy);
  ctx.restore();
}

function drawBoard(ctx,W,H,board){
  if(!board||!board.length)return;
  const cw=Math.max(40,W*.062),ch=cw*1.37,gap=5,total=5*(cw+gap)-gap;
  const by=H/2-ch/2+H*.01;
  const sx=W/2-total/2;
  for(let i=0;i<5;i++){
    if(i<board.length) drawCard(ctx,sx+i*(cw+gap)+cw/2,by+ch/2,board[i],cw,ch,false);
    else{ctx.save();roundRect(ctx,sx+i*(cw+gap),by,cw,ch,4);ctx.strokeStyle='rgba(212,160,23,.10)';ctx.lineWidth=1;ctx.stroke();ctx.restore();}
  }
}

function drawSeat(ctx,s,pos,W,H,seatAction,cards){
  const{x,y}=pos;
  const isActive=seatAction!==null&&seatAction!==undefined;
  const{pw,ph,cw,ch,ov,blockH}=seatBlockMetrics(W,H);
  const plateTop=y+blockH/2-ph;
  const plateLeft=x-pw/2;
  const cardCenterY=y-blockH/2+ch/2;
  const fanA=0.10;

  // ── 1. CARDS ──
  if(s.folded){
    [-1,1].forEach(dir=>{ctx.save();ctx.translate(x+dir*cw*.48,cardCenterY);ctx.rotate(dir*fanA*.55);drawFoldedCard(ctx,0,0,cw,ch);ctx.restore();});
  } else if(cards){
    cards.forEach((c,i)=>{ const dir=i===0?-1:1; ctx.save();ctx.translate(x+dir*cw*.50,cardCenterY);ctx.rotate(dir*(s.isHero?.06:.09)*fanA);drawCard(ctx,0,0,c,cw,ch,isActive&&s.isHero);ctx.restore(); });
  } else {
    [-1,1].forEach(dir=>{ctx.save();ctx.translate(x+dir*cw*.48,cardCenterY);ctx.rotate(dir*fanA*.65);drawFacedownCard(ctx,0,0,cw,ch);ctx.restore();});
  }

  // ── 2. ACTIVE GLOW ──
  if(isActive){
    ctx.save();ctx.shadowColor='rgba(212,160,23,.70)';ctx.shadowBlur=16;
    roundRect(ctx,plateLeft-2,plateTop-2,pw+4,ph+4,9);
    ctx.strokeStyle='#d4a017';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
  }

  // ── 3. NAMEPLATE BACKGROUND ──
  ctx.save();
  roundRect(ctx,plateLeft,plateTop,pw,ph,7);
  if(isActive)       ctx.fillStyle='rgba(130,84,0,.97)';
  else if(s.allin)   ctx.fillStyle='rgba(82,5,5,.97)';
  else if(s.folded)  ctx.fillStyle='rgba(12,12,18,.55)';
  else               ctx.fillStyle='rgba(10,14,28,.97)';
  ctx.fill();
  ctx.strokeStyle=isActive?'rgba(212,160,23,.55)':s.allin?'rgba(160,22,22,.55)':'rgba(28,34,52,.9)';
  ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  // ── 4. POSITION BADGE (inside nameplate, right side) ──
  const posW = s.pos ? Math.max(24, W*.034) : 0;
  const posX = plateLeft + pw - posW - 4;
  if(s.pos){
    const pc = POS_COLOR[s.pos]||'#888';
    ctx.save();
    roundRect(ctx, posX, plateTop+4, posW, ph-8, 4);
    ctx.fillStyle=pc+'22'; ctx.fill();
    ctx.strokeStyle=pc; ctx.lineWidth=1; ctx.stroke();
    ctx.font=`700 ${Math.max(7,W*.009)}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=pc;
    ctx.fillText(s.pos, posX+posW/2, plateTop+ph/2);
    ctx.restore();
  }

  // ── 5. NAME + STACK (clipped to full text area) ──
  const textW = pw - posW - (posW ? 10 : 8);
  const textCX = plateLeft + 4 + textW/2;
  const fsName  = Math.max(11, W*.013);
  const fsStack = Math.max(11, W*.013);
  const nameY  = plateTop + ph*0.30;
  const stackY = plateTop + ph*0.72;

  ctx.save();
  ctx.beginPath(); ctx.rect(plateLeft+3, plateTop+2, textW, ph-4); ctx.clip();

  // Name
  ctx.font=`700 ${fsName}px 'Segoe UI',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle = s.folded?'#3a3a48' : isActive?'#fff' : '#b0c4de';
  ctx.fillText(s.name.length>16?s.name.slice(0,16)+'…':s.name, textCX, nameY);

  // Stack / action
  if(isActive && seatAction.action){
    const act=seatAction.action, amt=seatAction.amount||'';
    let col='#a0b0c0';
    if(act==='Fold')col='#606070';
    else if(act==='Check')col='#8898aa';
    else if(act==='Call')col='#3a8fe0';
    else if(act.includes('Raise')||act.includes('Bet'))col='#e07830';
    else if(act.includes('ALL-IN'))col='#ff4444';
    else if(act==='Vince')col='#38cc68';
    else if(act==='SB'||act==='BB')col='#7080a0';
    ctx.font=`700 ${fsStack}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=col;
    ctx.fillText(amt?`${act}  ${amt}`:act, textCX, stackY);
  } else {
    ctx.font=`${fsStack}px 'Courier New',monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = s.folded ? '#606878' : '#a0b8cc';
    ctx.fillText(fmtStack(s.stack), textCX, stackY);
  }
  ctx.restore();

  // ── 6. BOUNTY BADGE — appendice centrata sotto il nameplate ──
  if(s.bounty && s.bounty > 0){
    const half = Math.ceil(s.bounty / 2 * 100) / 100;
    const bLabel = '⊕ €' + half.toFixed(2);
    const bfs = Math.max(7, W*.009);
    ctx.save();
    ctx.font = `700 ${bfs}px 'Segoe UI',sans-serif`;
    const bw = ctx.measureText(bLabel).width + 10;
    const bh = bfs * 1.6;
    const bx = plateLeft;
    const by = plateTop + ph + 2;          // 2px sotto il bordo inferiore del nameplate
    // piccolo triangolino di connessione
    ctx.beginPath();
    ctx.moveTo(plateLeft + 4, plateTop + ph);
    ctx.lineTo(plateLeft + 12, plateTop + ph);
    ctx.lineTo(plateLeft + 8, plateTop + ph + 4);
    ctx.closePath();
    ctx.fillStyle = s.folded ? 'rgba(60,50,0,.35)' : 'rgba(90,60,0,.7)';
    ctx.fill();
    // pill
    roundRect(ctx, bx, by, bw, bh, bh/2);
    ctx.fillStyle = s.folded ? 'rgba(60,50,0,.35)' : 'rgba(90,60,0,.7)';
    ctx.fill();
    ctx.strokeStyle = s.folded ? 'rgba(140,100,0,.15)' : 'rgba(212,160,23,.55)';
    ctx.lineWidth = .8; ctx.stroke();
    ctx.fillStyle = s.folded ? '#504820' : '#f0c030';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(bLabel, bx + bw/2, by + bh/2);
    ctx.restore();
  }

  // ALL-IN badge is now drawn in drawBetChip on the chip itself
}

// ── CARDS ───────────────────────────────────────────────────────
function drawCard(ctx,x,y,cs,w,h,glow){
  const rank=cs.slice(0,-1),suit=cs.slice(-1);
  const bg=SUIT_BG[suit]||'#2a2d35',bg2=SUIT_BG2[suit]||'#363a44';
  ctx.save();
  if(glow){ctx.shadowColor='rgba(212,160,23,.9)';ctx.shadowBlur=16;}
  roundRect(ctx,x-w/2+1,y-h/2+3,w,h,6);ctx.fillStyle='rgba(0,0,0,.6)';ctx.fill();
  roundRect(ctx,x-w/2,y-h/2,w,h,6);ctx.fillStyle=bg;ctx.fill();
  ctx.save();roundRect(ctx,x-w/2,y-h/2,w,h,6);ctx.clip();ctx.fillStyle=bg2;ctx.fillRect(x-w/2,y-h/2,w,h*.45);ctx.restore();
  roundRect(ctx,x-w/2,y-h/2,w,h,6);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=.5;ctx.stroke();
  ctx.shadowBlur=0;
  const fsM=Math.max(13,w*.68);ctx.font=`900 ${fsM}px 'Segoe UI',Arial,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#ffffff';ctx.fillText(RANK[rank]||rank,x,y+h*.06);
  const fsS=Math.max(7,w*.26);ctx.font=`700 ${fsS}px 'Segoe UI',Arial,sans-serif`;ctx.textAlign='right';ctx.textBaseline='top';ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillText(SYM[suit]||suit,x+w/2-3,y-h/2+3);
  ctx.restore();
}

// Pure Canvas card back — CRUSH MTT branded, vector, infinite resolution
function drawFacedownCard(ctx,x,y,w,h){
  const r=Math.max(4,w*.12);
  ctx.save();

  // ── shadow ──
  roundRect(ctx,x-w/2+1,y-h/2+3,w,h,r);
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fill();

  // ── clip to card shape ──
  roundRect(ctx,x-w/2,y-h/2,w,h,r); ctx.clip();

  // ── background: deep black ──
  ctx.fillStyle='#080a10'; ctx.fillRect(x-w/2,y-h/2,w,h);

  // ── subtle radial highlight top-center ──
  const hl=ctx.createRadialGradient(x,y-h*.35,0,x,y-h*.1,w*.7);
  hl.addColorStop(0,'rgba(255,255,255,.06)');
  hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hl; ctx.fillRect(x-w/2,y-h/2,w,h);

  // ── outer gold border (inside card) ──
  const brd=Math.max(1.5,w*.04);
  roundRect(ctx,x-w/2+brd,y-h/2+brd,w-brd*2,h-brd*2,r*.7);
  ctx.strokeStyle='#c8a020'; ctx.lineWidth=Math.max(1,w*.028); ctx.stroke();

  // ── inner thin gold line ──
  const brd2=brd+Math.max(1.5,w*.03);
  roundRect(ctx,x-w/2+brd2,y-h/2+brd2,w-brd2*2,h-brd2*2,r*.5);
  ctx.strokeStyle='rgba(200,160,32,.4)'; ctx.lineWidth=Math.max(.5,w*.012); ctx.stroke();

  // ── corner suit symbols ──
  const cfs=Math.max(6,w*.22);
  ctx.font=`700 ${cfs}px Arial,sans-serif`;
  ctx.fillStyle='rgba(200,160,32,.55)';
  const margin=brd2+Math.max(2,w*.06);
  // top-left ♠, top-right ♣, bottom-left ♥, bottom-right ♦
  ctx.textAlign='left';  ctx.textBaseline='top';    ctx.fillText('♠',x-w/2+margin,y-h/2+margin);
  ctx.textAlign='right'; ctx.textBaseline='top';    ctx.fillText('♣',x+w/2-margin,y-h/2+margin);
  ctx.textAlign='left';  ctx.textBaseline='bottom'; ctx.fillText('♥',x-w/2+margin,y+h/2-margin);
  ctx.textAlign='right'; ctx.textBaseline='bottom'; ctx.fillText('♦',x+w/2-margin,y+h/2-margin);

  // ── central logo text ──
  // "CRUSH" top line
  const fs1=Math.max(7,w*.20);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`900 ${fs1}px 'Segoe UI',Arial,sans-serif`;
  // text shadow for depth
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=Math.max(2,w*.06);
  ctx.fillStyle='#d4a020';
  ctx.fillText('CRUSH',x,y-h*.10);
  // "MTT" bottom line
  const fs2=Math.max(6,w*.17);
  ctx.font=`900 ${fs2}px 'Segoe UI',Arial,sans-serif`;
  ctx.fillText('MTT',x,y+h*.10);
  ctx.shadowBlur=0;

  // ── spade icon between the two words ──
  const sfs=Math.max(4,w*.10);
  ctx.font=`${sfs}px Arial`;
  ctx.fillStyle='rgba(212,160,32,.7)';
  ctx.fillText('♠',x,y);

  ctx.restore();

  // ── outer border ──
  roundRect(ctx,x-w/2,y-h/2,w,h,r);
  ctx.strokeStyle='rgba(180,140,20,.6)'; ctx.lineWidth=Math.max(.5,w*.015); ctx.stroke();
}

function drawFoldedCard(ctx,x,y,w,h){
  const r=Math.max(4,w*.12);
  ctx.save();

  roundRect(ctx,x-w/2+1,y-h/2+3,w,h,r);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fill();

  roundRect(ctx,x-w/2,y-h/2,w,h,r); ctx.clip();

  // same design but dimmed/desaturated
  ctx.fillStyle='rgba(8,10,16,.55)'; ctx.fillRect(x-w/2,y-h/2,w,h);

  const brd=Math.max(1.5,w*.04);
  roundRect(ctx,x-w/2+brd,y-h/2+brd,w-brd*2,h-brd*2,r*.7);
  ctx.strokeStyle='rgba(120,90,15,.3)'; ctx.lineWidth=Math.max(1,w*.028); ctx.stroke();

  const cfs=Math.max(5,w*.18);
  ctx.font=`700 ${cfs}px Arial,sans-serif`;
  ctx.fillStyle='rgba(130,100,20,.25)';
  const margin=brd+Math.max(2,w*.06);
  ctx.textAlign='left';  ctx.textBaseline='top';    ctx.fillText('♠',x-w/2+margin,y-h/2+margin);
  ctx.textAlign='right'; ctx.textBaseline='top';    ctx.fillText('♣',x+w/2-margin,y-h/2+margin);
  ctx.textAlign='left';  ctx.textBaseline='bottom'; ctx.fillText('♥',x-w/2+margin,y+h/2-margin);
  ctx.textAlign='right'; ctx.textBaseline='bottom'; ctx.fillText('♦',x+w/2-margin,y+h/2-margin);

  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`900 ${Math.max(6,w*.18)}px 'Segoe UI',Arial,sans-serif`;
  ctx.fillStyle='rgba(130,100,15,.3)';
  ctx.fillText('CRUSH',x,y-h*.10);
  ctx.font=`900 ${Math.max(5,w*.15)}px 'Segoe UI',Arial,sans-serif`;
  ctx.fillText('MTT',x,y+h*.10);

  ctx.restore();

  roundRect(ctx,x-w/2,y-h/2,w,h,r);
  ctx.strokeStyle='rgba(100,80,10,.2)'; ctx.lineWidth=.5; ctx.stroke();
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function fmt(n){if(!n&&n!==0)return '0';if(n>=1000000)return (n/1000000).toFixed(1)+'M';if(n>=1000)return (n/1000).toFixed(1)+'k';return String(n);}

// keyboard nav and resize handled above  


(function loadSharedHand(){
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('hand');
  if(!encoded) return;
  try {
    const handText = decodeURIComponent(escape(atob(encoded)));
    const raw = splitHands(handText);
    if(!raw.length) return;
    allHandsRaw = raw;
    for(const r of raw){
      try { allHands.push(parseHandAuto(r)); } catch(e){ console.warn(e); }
    }
    if(!allHands.length) return;
    document.getElementById('input-panel').style.display='none';
    document.getElementById('replayer').className='visible';
    renderSidebar();
    selectHand(0);
  } catch(e){ console.warn('Errore caricamento mano condivisa:', e); }
})();
